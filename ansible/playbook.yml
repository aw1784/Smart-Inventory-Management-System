---
- name: Setup Production Environment and Deploy Application
  hosts: all
  become: yes
  vars:
    project_name: "Smart-Inventory-Management-System"
    project_path: "/opt/{{ project_name }}"
    ngrok_auth_token: "YOUR_NGROK_AUTH_TOKEN_HERE"
    github_repo: "https://github.com/aw1784/Smart-Inventory-Management-System.git"

  tasks:
    # ==========================================
    # 1. System Prerequisites
    # ==========================================
    - name: Install required system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - gnupg
          - git
          - openjdk-21-jre
        state: present
        update_cache: yes

    # ==========================================
    # 2. Docker Setup
    # ==========================================
    - name: Add Docker GPG apt Key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker Repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker and Docker Compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: latest
        update_cache: yes

    - name: Ensure Docker service is running and enabled
      service:
        name: docker
        state: started
        enabled: yes

    # ==========================================
    # 3. Jenkins Setup
    # ==========================================
    - name: Add Jenkins GPG key
      apt_key:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
        state: present

    - name: Add Jenkins Repository
      apt_repository:
        repo: "deb https://pkg.jenkins.io/debian-stable binary/"
        state: present

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present
        update_cache: yes

    - name: Ensure Jenkins service is running and enabled
      service:
        name: jenkins
        state: started
        enabled: yes

    # ==========================================
    # 4. Ngrok Setup
    # ==========================================
    - name: Install Ngrok via Snap
      snap:
        name: ngrok
        state: present

    - name: Configure Ngrok Auth Token
      command: "ngrok config add-authtoken {{ ngrok_auth_token }}"
      when: ngrok_auth_token != 'YOUR_NGROK_AUTH_TOKEN_HERE'

    # ==========================================
    # 5. Application Deployment (Git & Env Injection)
    # ==========================================
    - name: Clone the application repository from GitHub
      git:
        repo: "{{ github_repo }}"
        dest: "{{ project_path }}"
        version: main
        force: yes

    - name: Inject Backend .env file for Production
      copy:
        dest: "{{ project_path }}/Backend/.env"
        mode: '0644'
        content: |
          MONGODB_URI=your_mongodb_connection_string_here
          PORT=3000
          SECRET_KEY=your_super_secret_key_for_production
          NODE_ENV=production
          ORIGIN=http://{{ inventory_hostname }}:5173

    - name: Inject Frontend .env file for Production
      copy:
        dest: "{{ project_path }}/Frontend/.env"
        mode: '0644'
        content: |
          VITE_SERVER=http://{{ inventory_hostname }}:3000
          VITE_MODE=PROD
          VITE_LOCAL=http://localhost:3000