name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - product-service
          - order-service
          - inventory-service
          - statistics-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: inventory-management-MERN/backend/${{ matrix.service }}/package.json
      - name: Install
        working-directory: inventory-management-MERN/backend/${{ matrix.service }}
        run: npm install
      - name: Test
        working-directory: inventory-management-MERN/backend/${{ matrix.service }}
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        working-directory: inventory-management-MERN/frontend
        run: npm install
      - name: Build
        working-directory: inventory-management-MERN/frontend
        run: npm run build
