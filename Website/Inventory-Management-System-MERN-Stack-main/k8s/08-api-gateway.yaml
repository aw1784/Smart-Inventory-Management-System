apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: inventory-management
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: DOCKERHUB_USER/ims-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: GATEWAY_PORT
              value: "4000"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:4001"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:4002"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:4003"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service:4004"
            - name: STATISTICS_SERVICE_URL
              value: "http://statistics-service:4005"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ims-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: inventory-management
spec:
  selector:
    app: api-gateway
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
