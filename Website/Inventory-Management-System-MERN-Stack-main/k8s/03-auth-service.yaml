apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: inventory-management
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: DOCKERHUB_USER/ims-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
          env:
            - name: AUTH_SERVICE_PORT
              value: "4001"
            - name: AUTH_MONGO_URI
              value: "mongodb://mongo:27017/inventory_auth"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ims-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              valueFrom:
                secretKeyRef:
                  name: ims-secrets
                  key: JWT_EXPIRES_IN
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: inventory-management
spec:
  selector:
    app: auth-service
  ports:
    - port: 4001
      targetPort: 4001
  type: ClusterIP
