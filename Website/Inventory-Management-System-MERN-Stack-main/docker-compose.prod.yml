services:
  backend:
    image: ahmedwalid1410/ims-backend:latest
    ports:
      - "3000:3000"
    env_file:
      - ./Backend/.env

  frontend:
    image: ahmedwalid1410/ims-frontend-prod:latest
    ports:
      - "5173:80"
    env_file:
      - ./Frontend/.env
    depends_on:
      - backend